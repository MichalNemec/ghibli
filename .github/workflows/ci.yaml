name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
      - run: flutter pub get
      - run: dart analyze lib/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
      - run: flutter pub get
      - run: flutter test --exclude-tags=patrol

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib/ test/
