name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.x"
          channel: stable
      - run: flutter pub get
      - name: Generate API
        run: bash scripts/generate-api.sh
      - run: dart analyze lib/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.x"
          channel: stable
      - run: flutter pub get
      - name: Generate API
        run: bash scripts/generate-api.sh
      - run: flutter test --exclude-tags=patrol

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.x"
          channel: stable
      - run: flutter pub get
      - name: Generate API
        run: bash scripts/generate-api.sh

      - name: Format generated API files
        run: dart format lib/api/ # Clean up the generator's messy code first

      - name: Check code formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/
